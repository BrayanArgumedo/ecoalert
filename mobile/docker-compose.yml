services:

  # ─────────────────────────────────────────────
  # Mobile React Native + Expo
  # ─────────────────────────────────────────────
  mobile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoalert_mobile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${LOCAL_IP}
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: npx expo start --lan
